<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e17">
    <title>로그인 - Stock Dashboard</title>
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e17;
            color: #e1e5ee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #64748b;
            font-size: 14px;
        }
        .login-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 28px;
        }

        /* Social Login */
        .social-section { margin-bottom: 24px; }
        .social-btn {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #1e293b;
            border-radius: 10px;
            background: #0a0e17;
            color: #e1e5ee;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .social-btn:hover { border-color: #3b82f6; background: #1e293b; }
        .social-btn img, .social-btn svg { width: 20px; height: 20px; }
        .social-btn.google { }
        .social-btn.kakao { background: #FEE500; color: #191919; border-color: #FEE500; }
        .social-btn.kakao:hover { background: #F5DC00; border-color: #F5DC00; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 12px;
            color: #475569;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1e293b;
        }

        /* Form */
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #1e293b;
            border-radius: 10px;
            background: #0a0e17;
            color: #e1e5ee;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #3b82f6; }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .submit-btn:hover { background: #2563eb; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .toggle-mode {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #64748b;
        }
        .toggle-mode a {
            color: #3b82f6;
            cursor: pointer;
            text-decoration: none;
        }

        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #f87171;
            margin-bottom: 14px;
            display: none;
        }

        .skip-link {
            text-align: center;
            margin-top: 20px;
        }
        .skip-link a {
            color: #475569;
            font-size: 13px;
            text-decoration: none;
        }
        .skip-link a:hover { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Stock Dashboard</h1>
            <p>종합 주식 분석 플랫폼</p>
        </div>

        <div class="login-card">
            <div class="social-section">
                <button class="social-btn google" onclick="loginWithGoogle()">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google로 계속하기
                </button>
                <button class="social-btn kakao" onclick="loginWithKakao()">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#191919" d="M12 3C6.48 3 2 6.36 2 10.5c0 2.63 1.76 4.97 4.42 6.33l-.93 3.41c-.08.29.25.52.5.35l4.09-2.72c.63.07 1.27.13 1.92.13 5.52 0 10-3.36 10-7.5S17.52 3 12 3z"/>
                    </svg>
                    카카오로 계속하기
                </button>
            </div>

            <div class="divider">또는</div>

            <div class="error-msg" id="errorMsg"></div>

            <form id="authForm" onsubmit="handleEmailAuth(event)">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="6자 이상" required minlength="6">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">로그인</button>
            </form>

            <div class="toggle-mode">
                <span id="toggleText">계정이 없으신가요?</span>
                <a id="toggleLink" onclick="toggleAuthMode()">회원가입</a>
            </div>
        </div>

        <div class="skip-link">
            <a href="/">로그인 없이 둘러보기 &rarr;</a>
        </div>
    </div>

    <script>
        let isSignUp = false;
        const SUPABASE_URL = ''; // .env에서 주입 또는 config API에서 가져옴

        // Supabase 설정 로드
        let supabaseClient = null;

        async function initSupabase() {
            try {
                const res = await fetch('/api/config/public');
                const config = await res.json();
                if (config.supabase_url && config.supabase_key) {
                    // Supabase JS SDK 동적 로드
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
                    script.onload = () => {
                        supabaseClient = supabase.createClient(config.supabase_url, config.supabase_key);
                        checkSession();
                    };
                    document.head.appendChild(script);
                }
            } catch (e) {
                // Supabase 미설정 → 로컬 모드
                console.log('Supabase not configured, using local auth');
            }
        }

        async function checkSession() {
            if (!supabaseClient) return;
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                saveSessionAndRedirect(session);
            }
        }

        function saveSessionAndRedirect(session) {
            localStorage.setItem('auth_token', session.access_token);
            localStorage.setItem('auth_user', JSON.stringify({
                id: session.user.id,
                email: session.user.email,
                token: session.access_token,
            }));
            window.location.href = '/';
        }

        // --- Social Login ---
        async function loginWithGoogle() {
            if (!supabaseClient) {
                showError('Supabase가 설정되지 않았습니다. 로컬 모드로 로그인하세요.');
                return;
            }
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/login' }
            });
            if (error) showError(error.message);
        }

        async function loginWithKakao() {
            if (!supabaseClient) {
                showError('Supabase가 설정되지 않았습니다. 로컬 모드로 로그인하세요.');
                return;
            }
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'kakao',
                options: { redirectTo: window.location.origin + '/login' }
            });
            if (error) showError(error.message);
        }

        // --- Email Auth ---
        async function handleEmailAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            if (supabaseClient) {
                // Supabase 모드
                try {
                    let result;
                    if (isSignUp) {
                        result = await supabaseClient.auth.signUp({ email, password });
                    } else {
                        result = await supabaseClient.auth.signInWithPassword({ email, password });
                    }
                    if (result.error) {
                        showError(result.error.message);
                    } else if (isSignUp && !result.data.session) {
                        showError('이메일 인증 링크를 확인해주세요.');
                    } else if (result.data.session) {
                        saveSessionAndRedirect(result.data.session);
                    }
                } catch (err) {
                    showError(err.message);
                }
            } else {
                // 로컬 테스트 모드: 이메일을 ID로 사용
                localStorage.setItem('auth_token', email);
                localStorage.setItem('auth_user', JSON.stringify({
                    id: email,
                    email: email,
                    token: email,
                }));
                window.location.href = '/';
            }
            btn.disabled = false;
        }

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('submitBtn').textContent = isSignUp ? '회원가입' : '로그인';
            document.getElementById('toggleText').textContent = isSignUp ? '이미 계정이 있으신가요?' : '계정이 없으신가요?';
            document.getElementById('toggleLink').textContent = isSignUp ? '로그인' : '회원가입';
            hideError();
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        // Init
        initSupabase();
    </script>
</body>
</html>
