<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stocks">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <title>Stock Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <header id="appHeader">
            <h1>Stock Dashboard</h1>
            <div class="header-controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="종목명 또는 코드 검색..." />
                    <div id="searchResults" class="search-results"></div>
                </div>
                <button id="refreshBtn" class="refresh-btn">새로고침</button>
                <button id="authBtn" class="auth-btn">로그인</button>
            </div>
            <div class="update-info">
                <span id="updateTime">-</span>
                <span id="autoRefreshStatus" class="auto-refresh">자동 갱신 30초</span>
            </div>
        </header>

        <!-- SPA Views -->
        <main>
            <section id="view-dashboard" class="view active"></section>
            <section id="view-signals" class="view"></section>
            <section id="view-portfolio" class="view"></section>
            <section id="view-analysis" class="view"></section>
        </main>

        <!-- 모달: 종목 상세 분석 -->
        <div id="analysisModal" class="modal hidden">
            <div class="modal-content modal-full">
                <div class="modal-header">
                    <h2 id="analysisTitle">-</h2>
                    <div id="analysisSignalBadge"></div>
                    <button class="close-btn" onclick="closeAnalysis()">&times;</button>
                </div>
                <div id="analysisBody" class="analysis-body">
                    <div class="loading">분석 중...</div>
                </div>
            </div>
        </div>

        <!-- 하단 네비게이션 -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="dashboard" onclick="navigateTo('dashboard')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                <span>대시보드</span>
            </button>
            <button class="nav-item" data-view="signals" onclick="navigateTo('signals')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                <span>신호등</span>
            </button>
            <button class="nav-item" data-view="portfolio" onclick="navigateTo('portfolio')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                <span>포트폴리오</span>
            </button>
            <button class="nav-item" data-view="search" onclick="document.getElementById('searchInput').focus()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>검색</span>
            </button>
        </nav>
    </div>

    <script src="/static/js/components/signal-badge.js"></script>
    <script src="/static/js/components/chart-utils.js"></script>
    <script src="/static/js/pages/dashboard.js"></script>
    <script src="/static/js/pages/signals.js"></script>
    <script src="/static/js/pages/portfolio.js"></script>
    <script src="/static/js/pages/analysis.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
